<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Path Builder</title>
  <link rel="icon" href="favicon.png" type="image/png">
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/256200ed53.js" crossorigin="anonymous"></script>
</head>
<body>

  <!-- BOTÓN HOME -->
  <button class="btn-home" id="homeButton" title="Home">
    <i class="fa-solid fa-house"></i>
  </button>

  <!-- ESPACIO DE TRABAJO -->
  <div class="scene">
    <canvas id="canvas"></canvas>
    <img src="robot.png" id="robot">
  </div>

  <!-- CONTROLES IZQUIERDA -->
  <div class="left-controls">
    <button class="control-btn play-btn" id="playBtn" title="Play">
      <i class="fa-solid fa-play"></i>
    </button>
    <button class="control-btn pause-btn" id="stopBtn" title="Pause">
      <i class="fa-solid fa-pause"></i>
    </button>
    <button class="control-btn reset-btn" id="resetBtn" title="Reset">
      <i class="fa-solid fa-trash"></i>
    </button>

    <!-- SEPARADOR -->
    <div class="speed-divider"></div>

    <!-- CONTROL DE VELOCIDAD -->
    <!-- Liebre arriba = rápido | Tortuga abajo = lento -->
    <div class="speed-control" id="speedControl">

      <!-- Liebre (rápido) — SVG inline -->
      <svg class="speed-icon speed-icon--fast" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" title="Fast">
        <!-- cuerpo -->
        <ellipse cx="28" cy="38" rx="16" ry="10" fill="currentColor"/>
        <!-- cabeza -->
        <circle cx="44" cy="32" r="8" fill="currentColor"/>
        <!-- ojo -->
        <circle cx="47" cy="30" r="1.5" fill="white"/>
        <!-- oreja larga izquierda -->
        <ellipse cx="40" cy="14" rx="3" ry="10" fill="currentColor" transform="rotate(-10 40 14)"/>
        <!-- oreja larga derecha -->
        <ellipse cx="48" cy="13" rx="3" ry="10" fill="currentColor" transform="rotate(10 48 13)"/>
        <!-- pata trasera -->
        <ellipse cx="16" cy="46" rx="7" ry="4" fill="currentColor" transform="rotate(-20 16 46)"/>
        <!-- pata delantera extendida (corriendo) -->
        <ellipse cx="38" cy="48" rx="8" ry="3.5" fill="currentColor" transform="rotate(15 38 48)"/>
        <!-- cola -->
        <circle cx="13" cy="36" r="4" fill="currentColor"/>
      </svg>

      <!-- Barra con 5 puntos -->
      <div class="speed-track" id="speedTrack">
        <div class="speed-fill" id="speedFill"></div>
        <button class="speed-dot" data-step="5" title="Fastest"></button>
        <button class="speed-dot" data-step="4" title="Fast"></button>
        <button class="speed-dot" data-step="3" title="Medium"></button>
        <button class="speed-dot" data-step="2" title="Slow"></button>
        <button class="speed-dot" data-step="1" title="Slowest"></button>
      </div>

      <!-- Tortuga (lento) — SVG inline -->
      <svg class="speed-icon speed-icon--slow" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" title="Slow">
        <!-- caparazón -->
        <ellipse cx="32" cy="32" rx="18" ry="13" fill="currentColor"/>
        <!-- patrón caparazón -->
        <ellipse cx="32" cy="30" rx="8" ry="6" fill="none" stroke="white" stroke-width="1.5"/>
        <line x1="32" y1="24" x2="32" y2="36" stroke="white" stroke-width="1.2"/>
        <line x1="24" y1="30" x2="40" y2="30" stroke="white" stroke-width="1.2"/>
        <!-- cabeza -->
        <circle cx="49" cy="30" r="6" fill="currentColor"/>
        <!-- ojo -->
        <circle cx="51" cy="28" r="1.2" fill="white"/>
        <!-- patas -->
        <ellipse cx="20" cy="42" rx="5" ry="3" fill="currentColor" transform="rotate(-30 20 42)"/>
        <ellipse cx="34" cy="44" rx="5" ry="3" fill="currentColor" transform="rotate(20 34 44)"/>
        <ellipse cx="18" cy="22" rx="5" ry="3" fill="currentColor" transform="rotate(30 18 22)"/>
        <ellipse cx="32" cy="20" rx="5" ry="3" fill="currentColor" transform="rotate(-20 32 20)"/>
        <!-- cola -->
        <ellipse cx="15" cy="33" rx="5" ry="2.5" fill="currentColor" transform="rotate(10 15 33)"/>
      </svg>

    </div>
  </div>

  <!-- DPAD DERECHA -->
  <div class="dpad">
    <button class="dpad-btn" onclick="addAction('F','up')" title="Forward">
      <i class="fa-solid fa-arrow-up"></i>
    </button>
    <div class="dpad-row">
      <button class="dpad-btn" onclick="addAction('L','left')" title="Left">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <div class="dpad-center"></div>
      <button class="dpad-btn" onclick="addAction('R','right')" title="Right">
        <i class="fa-solid fa-arrow-right"></i>
      </button>
    </div>
    <button class="dpad-btn" onclick="addAction('B','down')" title="Backward">
      <i class="fa-solid fa-arrow-down"></i>
    </button>
  </div>

  <!-- CONTROLES INFERIORES -->
  <div class="bottom-controls">
    <button class="toggle-seq-btn" id="toggleSeq" title="Show/hide sequence">
      <i class="fa-solid fa-eye"></i>
    </button>
    <div class="seq-wrapper" id="seqWrapper" style="display:none;">
      <div class="sequence-box" id="sequenceBox"></div>
      <button class="delete-btn" id="deleteBtn" title="Delete">
        <i class="fa-solid fa-delete-left"></i>
      </button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
